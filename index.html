<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />

        <!-- PWA Meta Tags - LukenFit Branding -->
        <meta name="theme-color" content="#3B82F6" />
        <meta name="background-color" content="#0F172A" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="LukenFit" />
        <meta name="application-name" content="LukenFit" />
        <meta
            name="description"
            content="Tu tracker personal de nutrición, entrenos y bienestar"
        />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.json" />

        <!-- Apple Touch Icons -->
        <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="/icons/icon-192x192.svg"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/icons/icon-192x192.svg"
        />
        <link
            rel="apple-touch-icon"
            sizes="167x167"
            href="/icons/icon-192x192.svg"
        />

        <title>LukenFit</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>

        <!-- Register Service Worker -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker
                        .register('/sw.js')
                        .then((registration) => {
                            console.log('SW registered:', registration.scope);

                            // Check for updates
                            registration.addEventListener('updatefound', () => {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', () => {
                                    if (
                                        newWorker.state === 'installed' &&
                                        navigator.serviceWorker.controller
                                    ) {
                                        // New content available, show update prompt
                                        if (
                                            confirm(
                                                'Nueva versión disponible. ¿Actualizar ahora?'
                                            )
                                        ) {
                                            newWorker.postMessage('skipWaiting');
                                            window.location.reload();
                                        }
                                    }
                                });
                            });
                        })
                        .catch((error) => {
                            console.log('SW registration failed:', error);
                        });
                });
            }
        </script>
    </body>
</html>

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />

        <!-- PWA Meta Tags - LukenFit Branding -->
        <meta name="theme-color" content="#F9FAFB" />
        <meta name="background-color" content="#F9FAFB" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="LukenFit" />
        <meta name="application-name" content="LukenFit" />
        <meta
            name="description"
            content="Tu tracker personal de nutrición, entrenos y bienestar"
        />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.json" />

        <!-- Apple Touch Icons -->
        <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="/icons/icon-192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/icons/icon-192x192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="167x167"
            href="/icons/icon-192x192.png"
        />

        <title>LukenFit</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>

        <!-- Register Service Worker -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', async () => {
                    try {
                        const registration = await navigator.serviceWorker.register(
                            '/sw.js'
                        );
                        console.log('SW registered:', registration.scope);

                        // Listen for SW messages (like SW_UPDATED)
                        navigator.serviceWorker.addEventListener(
                            'message',
                            (event) => {
                                if (event.data?.type === 'SW_UPDATED') {
                                    console.log(
                                        'SW updated to:',
                                        event.data.version
                                    );
                                    // Auto reload without prompt to get latest version
                                    window.location.reload();
                                }
                            }
                        );

                        // Check for updates immediately and every 5 minutes
                        registration.update();
                        setInterval(() => registration.update(), 5 * 60 * 1000);

                        // Handle new SW installed
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (
                                    newWorker.state === 'installed' &&
                                    navigator.serviceWorker.controller
                                ) {
                                    // New SW is ready, skip waiting
                                    newWorker.postMessage('skipWaiting');
                                }
                            });
                        });
                    } catch (error) {
                        console.log('SW registration failed:', error);
                    }
                });

                // Handle controllerchange - reload when new SW takes over
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('New SW controller, reloading...');
                    window.location.reload();
                });
            }
        </script>
    </body>
</html>

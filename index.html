    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>

        <!-- Register Service Worker -->
        <script>
            if ('serviceWorker' in navigator) {
                // Track when page was loaded to prevent reloading during initial auth
                const pageLoadTime = Date.now();
                const MIN_TIME_BEFORE_RELOAD = 15000; // 15 seconds

                // 🔒 CRITICAL FIX: Clear auth-completed flag on page load
                // This prevents infinite reload loops caused by sessionStorage persistence
                sessionStorage.removeItem('auth-completed');

                // Track last reload to prevent duplicate reloads
                let lastReloadTime = 0;
                const MIN_TIME_BETWEEN_RELOADS = 2000; // 2 seconds debounce

                // Check if it's safe to reload (auth completed or enough time passed)
                const isSafeToReload = () => {
                    const timeSinceLoad = Date.now() - pageLoadTime;
                    const timeSinceLastReload = Date.now() - lastReloadTime;
                    const authCompleted = sessionStorage.getItem('auth-completed') === 'true';

                    console.log('[SW] Reload safety check:', {
                        timeSinceLoad,
                        timeSinceLastReload,
                        authCompleted,
                        minTimeRequired: MIN_TIME_BEFORE_RELOAD
                    });

                    // Prevent duplicate reloads within 2 seconds
                    if (timeSinceLastReload < MIN_TIME_BETWEEN_RELOADS && lastReloadTime > 0) {
                        console.log('[SW] Reload debounced (too soon since last reload)');
                        return false;
                    }

                    // Safe if auth is done OR if we've been running for 15+ seconds
                    return authCompleted || timeSinceLoad >= MIN_TIME_BEFORE_RELOAD;
                };

                // Perform reload with cleanup
                const performReload = () => {
                    lastReloadTime = Date.now();
                    // Clear flag before reload to prevent loop
                    sessionStorage.removeItem('auth-completed');
                    console.log('[SW] Reloading...');
                    window.location.reload();
                };

                window.addEventListener('load', async () => {
                    try {
                        const registration =
                            await navigator.serviceWorker.register('/sw.js');
                        console.log('SW registered:', registration.scope);

                        // Listen for SW messages (like SW_UPDATED)
                        navigator.serviceWorker.addEventListener(
                            'message',
                            (event) => {
                                if (event.data?.type === 'SW_UPDATED') {
                                    console.log(
                                        'SW updated to:',
                                        event.data.version,
                                    );

                                    if (isSafeToReload()) {
                                        console.log('[SW] Safe to reload, reloading now...');
                                        performReload();
                                    } else {
                                        console.warn('[SW] NOT safe to reload yet, deferring...');
                                        // Retry after 5 seconds
                                        setTimeout(() => {
                                            if (isSafeToReload()) {
                                                console.log('[SW] Deferred reload executing...');
                                                performReload();
                                            }
                                        }, 5000);
                                    }
                                }
                            },
                        );

                        // Check for updates immediately and every 5 minutes
                        registration.update();
                        setInterval(() => registration.update(), 5 * 60 * 1000);

                        // Handle new SW installed
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (
                                    newWorker.state === 'installed' &&
                                    navigator.serviceWorker.controller
                                ) {
                                    // New SW is ready, skip waiting
                                    newWorker.postMessage('skipWaiting');
                                }
                            });
                        });
                    } catch (error) {
                        console.log('SW registration failed:', error);
                    }
                });

                // Handle controllerchange - only reload if safe
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('[SW] New controller detected');

                    if (isSafeToReload()) {
                        console.log('[SW] Safe to reload for controller change, reloading...');
                        performReload();
                    } else {
                        console.warn('[SW] NOT safe to reload yet for controller change, deferring...');
                        // Retry after 5 seconds
                        setTimeout(() => {
                            if (isSafeToReload()) {
                                console.log('[SW] Deferred controller reload executing...');
                                performReload();
                            }
                        }, 5000);
                    }
                });
            }
        </script>
    </body>

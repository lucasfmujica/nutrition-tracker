<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0F172A"/>
  <!-- L shape -->
  <path d="M56 40 L56 130 L116 130 L116 112 L76 112 L76 40 Z" fill="url(#grad192)" filter="url(#glow)"/>
  <!-- Lightning bolt -->
  <path d="M108 40 L82 92 L102 92 L90 152 L142 84 L118 84 L136 40 Z" fill="url(#grad192)" filter="url(#glow)"/>
  <!-- Border glow -->
  <rect width="192" height="192" rx="40" fill="none" stroke="url(#grad192)" stroke-width="4" opacity="0.4"/>
</svg>

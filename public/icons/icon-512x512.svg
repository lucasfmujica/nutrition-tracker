<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="4"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with subtle gradient -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <rect width="512" height="512" rx="100" fill="url(#grad512)" opacity="0.05"/>
  <!-- L shape with depth -->
  <path d="M148 105 L148 345 L308 345 L308 295 L200 295 L200 105 Z" fill="url(#grad512)" filter="url(#glow512)"/>
  <!-- Lightning bolt with energy -->
  <path d="M288 105 L218 245 L270 245 L238 407 L380 225 L318 225 L364 105 Z" fill="url(#grad512)" filter="url(#glow512)"/>
  <!-- Outer glow ring -->
  <rect width="512" height="512" rx="100" fill="none" stroke="url(#grad512)" stroke-width="8" opacity="0.3"/>
  <!-- Inner highlight -->
  <rect x="20" y="20" width="472" height="472" rx="85" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>
</svg>

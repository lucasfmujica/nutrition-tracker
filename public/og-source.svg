<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Blue to Dark Slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" /> <!-- Blue 800 -->
      <stop offset="100%" stop-color="#0F172A" /> <!-- Slate 900 -->
    </linearGradient>

    <!-- Logo Gradient: Brighter to pop on dark bg -->
    <linearGradient id="logoBrightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
       <stop offset="0%" stop-color="#60A5FA" /> <!-- Blue 400 -->
       <stop offset="100%" stop-color="#22D3EE" /> <!-- Cyan 400 -->
    </linearGradient>

    <!-- Icon Stroke Color -->
    <style>
      .icon-stroke {
        stroke: #CBD5E1;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle decorative circles in background -->
  <circle cx="100" cy="100" r="300" fill="#3B82F6" opacity="0.1" />
  <circle cx="1100" cy="500" r="250" fill="#06B6D4" opacity="0.1" />

  <!-- Main Content Group: Centered -->
  <g transform="translate(600, 250)">

      <!-- Logo Scaled -->
      <g transform="translate(-308, -80) scale(3.5)">
          <!-- Logo Graphics -->
          <g transform="scale(1.25)">
            <circle cx="16" cy="16" r="15" fill="#F8FAFC" stroke="url(#logoBrightGrad)" stroke-width="1.5" />
            <path d="M10 7 L10 21 L19 21 L19 18 L13 18 L13 7 Z" fill="url(#logoBrightGrad)" />
            <path d="M18 7 L14 15 L17 15 L15 25 L23 14 L19 14 L22 7 Z" fill="url(#logoBrightGrad)" opacity="0.9" />
          </g>

          <!-- Logo Text: Using Satoshi, but standard sizing. -->
          <text x="52" y="29" font-family="'Satoshi', 'Inter', 'Proxima Nova', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="24" letter-spacing="-0.05em">
            <tspan fill="#FFFFFF">LUKEN</tspan><tspan fill="#22D3EE">FIT</tspan>
          </text>
      </g>

      <!-- Subtitle -->
      <text x="0" y="130" text-anchor="middle" font-family="'Satoshi', 'Inter', 'Segoe UI', sans-serif" font-size="36" fill="#F1F5F9" font-weight="500" letter-spacing="1">
          Tu Tracker Personal de Nutrición y Entrenos
      </text>

      <!-- Features Row
           Moved down slightly to give room.
           Icons moved UP (translate y changed from -40 to -55) to create separation.
           Text moved DOWN (y changed from 20 to 35).
      -->
      <g transform="translate(0, 240)"> <!-- Lowered base Y by 10px -->

          <!-- Item 1: Macros -->
          <g transform="translate(-350, 0)">
            <!-- ChartPie Icon
                 Original Box: 24x24. Scale 2 -> 48x48.
                 Translate(-24, -55) ->
                 Top Left: (-24, -55).
                 Bottom Right: (24, -7).
            -->
            <g transform="translate(-24, -55) scale(2)" class="icon-stroke">
               <path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.998.398-.998.95v8a1 1 0 0 0 1 1z" />
               <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
            </g>
            <!-- Text Baseline at 35.
                 Cap height approx 20 -> Top at 15.
                 Gap between Icon Bottom (-7) and Text Top (15) = 22px. Plenty of space.
            -->
            <text x="0" y="35" text-anchor="middle" font-family="'Satoshi', 'Inter', 'Segoe UI', sans-serif" font-size="28" fill="#CBD5E1" font-weight="500">Macros</text>
          </g>

          <!-- Separator dot -->
          <circle cx="-175" cy="-10" r="3" fill="#64748B" />

          <!-- Item 2: Entrenos -->
          <g transform="translate(0, 0)">
             <!-- Dumbbell Icon -->
             <g transform="translate(-24, -55) scale(2)" class="icon-stroke">
                <path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z" />
                <path d="m2.5 21.5 1.4-1.4" />
                <path d="m20.1 3.9 1.4-1.4" />
                <path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z" />
                <path d="m9.6 14.4 4.8-4.8" />
             </g>
             <text x="0" y="35" text-anchor="middle" font-family="'Satoshi', 'Inter', 'Segoe UI', sans-serif" font-size="28" fill="#CBD5E1" font-weight="500">Entrenos</text>
          </g>

          <!-- Separator dot -->
          <circle cx="175" cy="-10" r="3" fill="#64748B" />

          <!-- Item 3: Progreso -->
          <g transform="translate(350, 0)">
              <!-- TrendingUp Icon -->
              <g transform="translate(-24, -55) scale(2)" class="icon-stroke">
                 <path d="M16 7h6v6" />
                 <path d="m22 7-8.5 8.5-5-5L2 17" />
              </g>
              <text x="0" y="35" text-anchor="middle" font-family="'Satoshi', 'Inter', 'Segoe UI', sans-serif" font-size="28" fill="#CBD5E1" font-weight="500">Progreso</text>
          </g>
      </g>
  </g>
</svg>
